<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Companion Sidepanel</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      background: #fafafa;
      color: #171717;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #09090b;
        color: #fafafa;
      }
    }

    h2 {
      margin-top: 0;
      font-size: 1.1rem;
      border-bottom: 1px solid #e5e5e5;
      padding-bottom: 0.5rem;
    }

    @media (prefers-color-scheme: dark) {
      h2 {
        border-bottom-color: #27272a;
      }
    }

    #chat-history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .msg {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      max-width: 85%;
      line-height: 1.4;
    }

    .msg.bot {
      background: rgba(0, 0, 0, 0.05);
      align-self: flex-start;
    }

    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
    }

    @media (prefers-color-scheme: dark) {
      .msg.bot {
        background: rgba(255, 255, 255, 0.05);
      }
    }

    .input-area {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      outline: none;
      background: transparent;
      color: inherit;
    }

    @media (prefers-color-scheme: dark) {
      input {
        border-color: #27272a;
      }
    }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h2>AI Side Panel Companion</h2>
  <div id="chat-history">
    <div class="msg bot">Hello! I am your local AI Companion running on Gemini Nano. How can I help you today?</div>
  </div>
  <div class="input-area">
    <input type="text" id="query-input" placeholder="Type prompt...">
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatHistory = document.getElementById('chat-history');
    const queryInput = document.getElementById('query-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
      const promptText = queryInput.value.trim();
      if (!promptText) return;

      // User bubble
      const userBubble = document.createElement('div');
      userBubble.className = 'msg user';
      userBubble.textContent = promptText;
      chatHistory.appendChild(userBubble);
      queryInput.value = '';
      chatHistory.scrollTop = chatHistory.scrollHeight;

      // Bot bubble placeholder
      const botBubble = document.createElement('div');
      botBubble.className = 'msg bot';
      botBubble.textContent = 'Thinking...';
      chatHistory.appendChild(botBubble);
      chatHistory.scrollTop = chatHistory.scrollHeight;

      // Send message to service worker background script
      chrome.runtime.sendMessage({ action: 'executePrompt', prompt: promptText }, (response) => {
        if (response && response.success) {
          botBubble.textContent = response.response;
        } else {
          botBubble.textContent = `Error: ${response ? response.error : 'No response from background'}`;
          botBubble.style.color = '#ef4444';
        }
        chatHistory.scrollTop = chatHistory.scrollHeight;
      });
    }

    sendBtn.addEventListener('click', sendMessage);
    queryInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
